services:
  mongo:
    image: mongo:latest
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  server:
    image: ${DOCKERHUB_USERNAME}/creator-platform-server:${SERVER_IMAGE_TAG:-latest}
    ports:
      - '5000:5000'
    env_file:
      - ./server/.env
    environment:
      # Force Docker network hostname for Mongo inside Compose network.
      MONGO_URI: mongodb://mongo:27017/workoutly
    depends_on:
      - mongo

  client:
    image: ${DOCKERHUB_USERNAME}/creator-platform-client:${CLIENT_IMAGE_TAG:-latest}
    ports:
      - '3000:80'
    depends_on:
      - server

volumes:
  mongo-data:
