version: '3.8'

services:
  mongo:
    image: mongo:latest
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  server:
    build: ./server
    ports:
      - '5000:5000'
    env_file:
      - ./server/.env
    environment:
      # Keep local .env usable outside Docker while forcing Docker network hostname in Compose.
      MONGO_URI: mongodb://mongo:27017/workoutly
    depends_on:
      - mongo

  client:
    build: ./client
    ports:
      - '3000:80'
    depends_on:
      - server

volumes:
  mongo-data:
